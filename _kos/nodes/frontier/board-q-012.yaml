title: "Should Perplexity MCP be project-level or user-level config?"
content: |
  Recommendation: project-level for scoped budget tracking. Project-level
  config allows per-project spending limits and usage auditing. User-level
  config would share a single budget across all projects, making cost
  attribution harder.
