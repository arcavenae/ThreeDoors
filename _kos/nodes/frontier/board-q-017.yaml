title: "How to handle submodule update conflicts during worktree rebase?"
content: |
  Submodule pointer changes can conflict during rebase. When multiple
  worktrees modify submodule references independently, rebasing onto
  main produces conflicts at the submodule pointer level that are
  harder to resolve than normal file conflicts.
