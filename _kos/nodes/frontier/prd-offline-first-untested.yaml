id: prd-offline-first-untested
type: question
confidence: frontier
title: "Has offline-first sync been tested under real multi-provider conditions?"
content: |
  NFR14 promises all core functionality offline with queued sync.
  Phase 4 adds 6 external API providers. WAL queuing exists but
  cross-provider conflict resolution complexity suggests offline-first
  may be aspirational rather than tested at scale. Each provider has
  different consistency guarantees, rate limits, and failure modes —
  the offline queue must handle all of them.
