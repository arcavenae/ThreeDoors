title: "Does Claude Code file scanner follow symlinks in .claude/commands/?"
content: |
  Critical for BMAD-as-submodule bridge. If Claude Code follows symlinks
  in .claude/commands/, BMAD templates can live in a git submodule and be
  symlinked into the commands directory. If not, the bridge needs a
  different approach (copy, script, or direct path). Needs empirical test.
