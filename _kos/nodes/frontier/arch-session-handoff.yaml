id: arch-session-handoff
type: element
confidence: frontier
title: "Session handoff protocol for persistent agent restarts"
content: |
  Agents write handoff state (handoff.md, session.jsonl, context.json).
  Daemon sends SESSION_HANDOFF_PREPARE, agent acknowledges with
  SESSION_HANDOFF_READY. Enables clean restart without losing work context.
