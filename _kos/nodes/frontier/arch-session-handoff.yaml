    type: derives
    note: "Handoff protocol is part of agent lifecycle governance"
  - target: inc-004
    type: contradicts
    note: "Handoff protocol depends on inter-agent messaging which INC-004 proved is broken — agents use SendMessage not multiclaude message send"
