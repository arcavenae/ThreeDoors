type: question
confidence: frontier
title: "Can settings.local.json exist per-worktree in multiclaude?"
content: |
  If settings.local.json can be scoped per-worktree, workers can have
  MCP disabled by default while the main worktree keeps MCP enabled.
  This would allow fine-grained control over which Claude Code instances
  have access to MCP servers.
