type: question
confidence: frontier
title: "Should director daemon be separate binary or integrated into multiclaude?"
content: |
  Separate binary: cleaner separation of concerns, independent
  lifecycle, can run without multiclaude. Integrated: simpler
  deployment, single process to manage, shared configuration.
  Affects how director is distributed, tested, and operated.
