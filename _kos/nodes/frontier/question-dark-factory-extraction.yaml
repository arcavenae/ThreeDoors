title: "Should the dark factory be extracted from ThreeDoors into a standalone platform?"
content: |
  board-p-014 recommends platform extraction to Marvel. R-013 flags the
  multiclaude licensing blocker. SOUL.md says the governance infrastructure
  'is as much a part of the project as the TUI itself.' Extracting it
  changes ThreeDoors from a two-project experiment to an app that consumes
  an external platform.
