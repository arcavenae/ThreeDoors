title: "What worker dispatch flags control MCP server availability at spawn?"
content: |
  Determines whether MCP toggle is a config-file concern or a
  spawn-time flag. If multiclaude can pass flags at worker spawn
  that control MCP availability, the dispatch layer owns MCP policy.
  If not, it must be pre-configured in settings files per-worktree.
