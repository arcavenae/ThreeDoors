id: prd-local-first
type: element
confidence: bedrock
title: "Local-first privacy: no telemetry, no accounts, no cloud unless configured"
content: |
  Data stays on machine. Integrations use local APIs or user tokens.
  No intermediary services. No accounts, no cloud sync unless the user
  explicitly configures it. Privacy is a structural guarantee, not a
  policy promise.
