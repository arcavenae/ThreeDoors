title: "TaskProvider interface — core abstraction for all storage backends"
content: |
  All adapters implement the same interface: Load, Save, Delete, Watch,
  HealthCheck. Registry manages discovery and lifecycle. This decouples
  domain logic from storage, making backends interchangeable.
