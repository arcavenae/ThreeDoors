title: "Governance authority matrix contradicts INC-003 — project-watchdog needs allocation authority it doesn't have"
content: |
  governance-model.md says project-watchdog "cannot modify story files" but
  INC-003 requires it to be sole allocator of epic/story numbers, which
  requires modification authority. The authority matrix doesn't include
  number allocation.
