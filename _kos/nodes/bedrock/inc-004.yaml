id: inc-004
type: finding
confidence: bedrock
title: "SendMessage tool silently drops inter-agent messages — tool naming misleads agents"
content: |
  All agents used Claude Code's built-in SendMessage tool (designed for
  subagent communication) instead of multiclaude's message send CLI command
  (Bash-based). 49+ messages were silently dropped, including project-watchdog's
  Epic 77 allocation. No error was returned, no delivery confirmation, no
  indication of failure. The tool name "SendMessage" matched the agents'
  intent perfectly, so they never reached for the Bash alternative. Root cause:
  ambiguous tool naming — Claude Code's SendMessage and multiclaude's messaging
  are completely different systems, but agents cannot distinguish them by name.
  Lesson: when platform tools shadow each other by name, agents will use the
  wrong one silently. Inter-agent messaging must be unambiguous and fail loudly.
