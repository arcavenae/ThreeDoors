id: prd-soul-constraint-drift
type: finding
confidence: bedrock
title: "SOUL.md says 'three doors not three hundred' but scope expanded to 70 epics and 353 stories"
content: |
  The constraint-is-the-feature principle from SOUL.md is contradicted by
  the actual product scope. Phase 1 was a tech demo; phases 2-7 added
  daily planning, seasonal themes, dependency graphs, LLM decomposition,
  statistics views, multiple integrations. SOUL says 'if a feature
  requires more than one story, reconsider' but most epics have 4-8
  stories. The founding constraint drifted as scope accumulated.
