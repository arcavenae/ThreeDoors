name: Bug Report
description: Report a bug in ThreeDoors
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Open ThreeDoors with `threedoors`
        2. Press '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: interface
    attributes:
      label: Interface
      description: Which interface were you using?
      options:
        - TUI (interactive terminal)
        - CLI (headless commands)
        - MCP Server
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ThreeDoors version
      description: Run `threedoors --version` to find this.
      placeholder: "0.1.0-alpha.20260310.abc1234"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version (if building from source)
      placeholder: "1.25.4"
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any error messages or logs.
      render: shell
  - type: textarea
    id: task-file
    attributes:
      label: Task file (if relevant)
      description: Paste a minimal task file that reproduces the issue (remove personal data).
      render: yaml
