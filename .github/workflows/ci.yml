name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@v0.7.0

      - name: Check formatting (gofumpt)
        run: |
          UNFORMATTED=$(gofumpt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::Files need formatting with gofumpt:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7

      - name: Run tests with coverage
        run: go test ./... -v -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Display coverage summary
        run: go tool cover -func=coverage.out

      - name: Validate build
        run: go build -o /dev/null ./cmd/threedoors

  alpha-release:
    name: Alpha Release
    needs: quality-gate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Build binaries
        run: |
          GOOS=darwin GOARCH=arm64 go build -o threedoors-darwin-arm64 ./cmd/threedoors
          GOOS=darwin GOARCH=amd64 go build -o threedoors-darwin-amd64 ./cmd/threedoors
          GOOS=linux GOARCH=amd64 go build -o threedoors-linux-amd64 ./cmd/threedoors

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: threedoors-binaries-${{ github.sha }}
          path: threedoors-*
          retention-days: 14

      - name: Generate release tag
        id: tag
        run: echo "tag=alpha-$(date -u +%Y%m%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Alpha ${{ steps.tag.outputs.tag }}
          body: |
            Automated alpha release from merge to main.

            **Commit:** ${{ github.sha }}

            **Binaries:**
            - `threedoors-darwin-arm64` — macOS Apple Silicon
            - `threedoors-darwin-amd64` — macOS Intel
            - `threedoors-linux-amd64` — Linux x86_64
          prerelease: true
          files: |
            threedoors-darwin-arm64
            threedoors-darwin-amd64
            threedoors-linux-amd64
